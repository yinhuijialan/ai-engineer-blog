name: Deploy to GitHub Pages

on:
  # 每次推送到 main 分支自动部署
  push:
    branches: [main]
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 授予 GITHUB_TOKEN 部署 Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的会取消进行中的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site + search index
        # 构建并生成 Pagefind 搜索索引（对应 package.json 的 build:search）
        run: npm run build:search

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
